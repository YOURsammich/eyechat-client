<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EyeChat</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link href="/theme.css" rel="stylesheet">
  <script>
    // Start the session handshake immediately, before the app bundle downloads
    // and parses, so this round-trip overlaps bundle load instead of stacking
    // after it. socket.init() reuses this in-flight promise.
    window.__preconnect = fetch('/preconnect', { method: 'POST' })
      .then(res => res.json())
      .catch(err => ({ success: false, error: err }));
  </script>

</head>
