<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cope.chat - Search the log</title>
  <!-- Shared chat message styles (flair, hats, colors, animations). No theme.css
       here on purpose: its global body/a rules would fight the search chrome,
       and chat-messages.css carries everything message rendering needs. -->
  <link href="/chat-messages.css" rel="stylesheet" />
  <!-- Search-page chrome. External (not inline) so the two-entry Vite build
       never invokes the html-inline-proxy plugin, which intermittently failed
       with "No matching HTML proxy module found". Lives in public/ so it's a
       stable runtime asset like theme.css / chat-messages.css. -->
  <link href="/search.css" rel="stylesheet" />
  <script type="module" crossorigin src="/assets/search-D9i3faxu.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/Messages-CfdLl226.js">
</head>
<body>
  <div id="root"></div>
</body>
</html>
